<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      /* background: rgba(14, 95, 14, 0.2); */
    }
    body {
      background: rgba(14, 95, 14, 0.6);
    }
    a,
    ul,
    li {
      list-style: none;
      text-decoration: none;
    }
    .container {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .content {
      width: 400px;
      height: 400px;
      background: rgba(14, 95, 14, 0.5);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 12px;
      color: #fff;
      gap: 12px;
    }
    .content h1 {
      font-size: 24px;
      background-color: #000;
      padding: 10px;
      border-radius: 12px;
    }
    .content input,
    .content select {
      width: 80%;
      height: 40px;
      border-radius: 8px;
      border: none;
      padding: 0 12px;
      color: #fff;
      background-color: #000;
    }
    .content button {
      width: 80%;
      height: 40px;
      border-radius: 8px;
      border: none;
      background: #0e5f0e;
      color: #fff;
      cursor: pointer;
    }

    .title {
      margin-top: 20px;
    }
    .result {
      background: rgba(14, 95, 14, 0.5);
      display: flex;
      flex-wrap: wrap; /* Xuống hàng */
      /* flex-direction: column;
      justify-content: center;
      align-items: center; */
      width: 100vw;
      border-radius: 12px;
      color: #fff;
      gap: 12px;
      margin-top: 24px;
      padding: 10px 20px;
    }
    .result h1 {
      font-size: 24px;
      background-color: #000;
      padding: 5px 10px;
      border-radius: 12px;
      height: fit-content;
      /* position: relative;
      top: -45px; */
    }
    .result .result-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .result .result-list li {
      background-color: #410793;
      padding: 10px;
      border-radius: 12px;
    }
    .result .result-list li span {
      font-weight: bold;
      background-color: #410793;
    }
  </style>
  <body>
    <div class="container">
      <div class="content">
        <h1>Manager Football</h1>
        <input type="text" id="name" name="name" placeholder="Enter name" />
        <input type="number" id="age" name="age" placeholder="Enter age" />
        <select name="address" id="address">
          <option value="quan12">Quận 12</option>
          <option value="hiepbinhphuoc">Hiệp Bình Phước</option>
          <option value="thuduc">Thủ Đức</option>
        </select>
        <button type="submit" id="submit-btn">Submit</button>
      </div>

        </div>
      </div>
